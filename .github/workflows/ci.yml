name: AuraCV CI

on:
  pull_request:
  push:
    branches:
      - main
      - fix/auto-self-heal

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma Generate
        run: npm --workspace apps/api run prisma:generate

      - name: Build
        run: npm run build

      - name: API E2E
        run: npm run test:e2e:api -- --runInBand --forceExit
